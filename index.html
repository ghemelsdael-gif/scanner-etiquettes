<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Poka-Yoke (Final)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        #video-container { width: 100%; max-width: 500px; margin: 0 auto; border: 3px solid #333; }
        video { width: 100%; }
        #result-box { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
    <h1>Contrôle de Cohérence</h1>
    <div id="video-container"><video id="video" autoplay playsinline></video></div>
    <button id="capture-btn" style="padding:15px; margin-top:15px;">🔍 Comparer les deux étiquettes</button>
    <div id="result-box"><h2 id="res-title"></h2><p id="res-desc"></p><button id="btn-save" style="display:none; padding:10px; background:#28a745; color:white; border:none;">💾 Enregistrer ce contrôle</button></div>
    <table id="history-table"><thead><tr><th>Heure</th><th>N° Suivi (T)</th><th>Code Produit</th></tr></thead><tbody id="history-body"></tbody></table>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let dernierScan = { t: "", code: "" };

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);

        document.getElementById('capture-btn').onclick = async () => {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const txt = text.toUpperCase();

            // 1. Extraction du numéro T
            const tMatch = txt.match(/T\s*?\d{7,10}/);
            const numeroT = tMatch ? tMatch[0].replace(/\s+/g, '') : null;

            // 2. Extraction des codes produits
            const matches = [...txt.matchAll(/(19MB4|19MB|23MB4|23MB)/g)];
            const uniqueCodes = [...new Set(matches.map(m => m[0]))];

            const resBox = document.getElementById('result-box');
            resBox.style.display = "block";

            if (!numeroT) {
                resBox.className = "error";
                document.getElementById('res-title').innerText = "❌ ERREUR";
                document.getElementById('res-desc').innerText = "Numéro de suivi (T) non détecté.";
            } else if (uniqueCodes.length === 0) {
                resBox.className = "error";
                document.getElementById('res-title').innerText = "❌ ERREUR";
                document.getElementById('res-desc').innerText = "Aucun code produit (19MB/23MB) trouvé.";
            } else if (uniqueCodes.length > 1) {
                resBox.className = "error";
                document.getElementById('res-title').innerText = "❌ INCOHÉRENCE";
                document.getElementById('res-desc').innerText = `Les deux étiquettes ne correspondent pas (${uniqueCodes.join(" / ")}).`;
            } else {
                resBox.className = "success";
                document.getElementById('res-title').innerText = "✅ CONFORME";
                document.getElementById('res-desc').innerText = `Suivi ${numeroT} confirmé avec ${uniqueCodes[0]}.`;
                dernierScan = { t: numeroT, code: uniqueCodes[0] };
                btnSave.style.display = "block";
            }
        };

        btnSave.onclick = () => {
            const row = document.getElementById('history-body').insertRow(0);
            row.innerHTML = `<td>${new Date().toLocaleTimeString()}</td><td>${dernierScan.t}</td><td>${dernierScan.code}</td>`;
            btnSave.style.display = "none";
        };
    </script>
</body>
</html>
