<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle Poka-Yoke (Analyse Totale)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; background-color: #f4f4f9; text-align: center; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; border: 3px solid #333; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        button { border: none; padding: 14px 24px; font-size: 1.05rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 90%; max-width: 500px; }
        #capture-btn { background-color: #007bff; color: white; }
        #result-box { margin-top: 15px; padding: 15px; border-radius: 8px; max-width: 470px; margin: 15px auto; display: none; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .success { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Contrôle Poka-Yoke</h1>
    <div id="video-container"><video id="video" autoplay playsinline></video></div>
    <button id="capture-btn">📷 Analyser toute la photo</button>
    <div id="status">Prêt. Visez l'étiquette blanche et la couleur.</div>
    <div id="result-box"><h3 id="result-title"></h3><p id="result-desc"></p></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const statusDiv = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => video.srcObject = stream);

        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            statusDiv.innerText = "Analyse globale en cours...";
            
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // OCR sur l'IMAGE ENTIÈRE (Tesseract scanne tout sans distinction de zone)
            const worker = await Tesseract.createWorker('eng');
            const { data: { text } } = await worker.recognize(canvas);
            await worker.terminate();

            const txt = text.toUpperCase();
            const tMatch = txt.match(/T\d{7,10}/);
            const has19 = txt.includes("19MB");
            const has23 = txt.includes("23MB");

            let isValid = false;
            let title = "";
            let msg = "";

            // Logique de validation globale
            if (has19 && has23) {
                title = "❌ ERREUR CONFLIT";
                msg = "Alerte : Incohérence (19MB & 23MB détectés).";
            } else if (!tMatch) {
                title = "❌ ÉCHEC";
                msg = "Numéro T non trouvé sur la photo.";
            } else if (!has19 && !has23) {
                title = "❌ ÉCHEC";
                msg = "Code produit (19MB/23MB) absent.";
            } else {
                isValid = true;
                title = `✅ CONFORME : ${tMatch[0]}`;
                msg = `Validation réussie pour ${has23 ? "23MB4" : "19MB4"}.`;
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerText = msg;
            document.getElementById('result-box').className = isValid ? "success" : "error";
            document.getElementById('result-box').style.display = "block";
            statusDiv.innerText = "Analyse terminée.";
            captureBtn.disabled = false;
        });
    </script>
</body>
</html>
